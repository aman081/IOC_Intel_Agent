services:
  api:
    build: .
    container_name: ioc-threat-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data

  ui:
    build: .
    container_name: ioc-threat-ui
    command: streamlit run ui/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - api
